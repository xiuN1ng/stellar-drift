<!DOCTYPE html>
<html lang="zh-Hans-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000010" />
    <title>Stellar Drift · 星际漂流</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000010;
        color: #e0e8ff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        outline: none;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: radial-gradient(ellipse at center, #0a0a30 0%, #000010 100%);
        z-index: 100;
        transition: opacity 0.8s ease-out;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-title {
        font-size: 28px;
        letter-spacing: 6px;
        margin-bottom: 24px;
        background: linear-gradient(90deg, #8ab4ff, #ffffff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #loading-status {
        font-size: 13px;
        opacity: 0.6;
        letter-spacing: 2px;
      }
      .loading-dot {
        display: inline-block;
        animation: pulse 1.4s infinite;
        margin: 0 2px;
      }
      .loading-dot:nth-child(2) { animation-delay: 0.2s; }
      .loading-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.3; }
        40% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div id="loading-title">STELLAR DRIFT</div>
      <div id="loading-status">
        计算星图坐标<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
      </div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
