name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs of this workflow on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Workaround for npm bug with optional platform-specific deps (e.g. @esbuild/aix-ppc64).
        # Regenerating lockfile + node_modules lets npm skip unsupported optionals instead of failing.
        # See: https://github.com/npm/cli/issues/4828
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        # Vite base is set to /REPO_NAME/ for GitHub Pages repo-path hosting.
        run: npx vite build --base=/${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
