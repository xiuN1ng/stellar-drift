name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs of this workflow on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # --omit=optional: skip platform-specific esbuild binaries (aix-ppc64 etc.) that are not needed on Linux x64.
        # Fall back to `npm install` if `npm ci` fails on lockfile integrity for the AIX-only esbuild sub-package.
        run: npm ci --omit=optional || npm install --omit=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        # Vite base is set to /REPO_NAME/ for GitHub Pages repo-path hosting.
        run: npx vite build --base=/${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
